<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Clif Tech</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="icon"type="image/png"href="cliftech white logo.jpeg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
</head>
<body>
<nav>
        <div class="nav-container">
            <a href="contact.html" 
            class="brand-group">
            <span class="brand-name">CLIF TECH</span>
            <img src="cliftech white logo.jpeg" alt="Company Logo"class="logo-img">
            </a>
            <input type="checkbox"
            id="menu-toggle">
            <label for="menu-toggle"
        class="menu-button"> 
    <span></span>
    <span></span>
    <span></span>
    
    </label>


            <ul class="nav-links">
                <li><a href="index.html"><i class="fa-solid fa-house"></i>Home</a></li>
                <li><a href="about.html"><i class="fa-solid fa-user"></i>About</a></li>
                <li><a href="services.html"><i class="fa-solid fa-gears"></i>Services</a></li>
                <li><a href="contact.html"class="active"><i class="fa-solid fa-envelope"></i>Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h4 class="typewriter-text">Get in Touch with CLIF TECH</h4>
        <p>We are dedicated to providing high-quality digital solutions</p>

        <form action="https://formspree.io/f/xkopwgnv" method="POST" class="contact-form">
            
            <input type="hidden" name="_next" value="https://formspree.io/f/xkopwgnv">
            
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" name="name" id="name" placeholder="Enter your name" required>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" placeholder="Enter your email address" required>
            </div>
            
            <div class="input-group">
                <label for="contact">Contact Number</label>
                <input type="tel" name="contact" id="contact" placeholder="Enter your contact" required>
            </div>


            <div class="input-group">
                <label for="service">Interested Service</label>
                <select name="service" id="service">
                    <option value=""disabled selected>Choose a Service</option>
                     <option value="System & Software">System & Software</option>
                    <option value="Ethical Hacking">Ethical Hacking</option>
                    <option value="Web Design">Website Design</option>
                    <option value="Cybersecurity">Cybersecurity Fundamentals</option>
                    <option value="Drone Piloting">Drone Piloting</option>
                    <option value="Other">Other IT Support</option>
                </select>
            </div>

            <div class="input-group">
                <label for="message">Message</label>
                <textarea name="message" id="message" rows="5" placeholder="Tell us how we can help you..." required></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </div>

     
<script>
    const menuToggle = document.getElementById('mobile-menu');
    const navLinks = document.querySelector('.nav-links');

    if (menuToggle) {
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            console.log("Menu toggled"); // This will show in your laptop's Inspect Console
        });
    }
    window.addEventListener('scroll', () => {
    const navContainer = document.querySelector('.nav-container');
    
    if (window.scrollY > 50) {
        navContainer.classList.add('scrolled');
    } else {
        navContainer.classList.remove('scrolled');
    }
});
</script>

</body>
</html>
